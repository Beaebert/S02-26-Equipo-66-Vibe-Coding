name: Deploy Blazor to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'FrontEnd/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: justina-blazor # Asegurate que este nombre coincida con el nombre en Azure
  AZURE_WEBAPP_PACKAGE_PATH: '.'      
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy-blazor:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build with dotnet
      run: dotnet build FrontEnd/Client/JustinaSimulation.Client.csproj --configuration Release

    - name: Publish with dotnet
      run: dotnet publish FrontEnd/Client/JustinaSimulation.Client.csproj -c Release -o publish_output

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_BLAZOR_PUBLISH_PROFILE }}
        package: publish_output/wwwroot
