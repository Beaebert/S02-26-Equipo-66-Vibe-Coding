name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'JustinaSimulator.API/**'
      - 'JustinaSimulator.Application/**'
      - 'JustinaSimulator.Domain/**'
      - 'JustinaSimulator.Infrastructure/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: justina-api # Asegurate que este nombre coincida con el nombre en Azure
  AZURE_WEBAPP_PACKAGE_PATH: '.'      
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build with dotnet
      run: dotnet build JustinaSimulator.API/JustinaSimulator.API.csproj --configuration Release

    - name: Publish with dotnet
      run: dotnet publish JustinaSimulator.API/JustinaSimulator.API.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        package: ${{env.DOTNET_ROOT}}/myapp
